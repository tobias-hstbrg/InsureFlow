spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:h2:mem:customerdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true

    flyway:
      enabled: true